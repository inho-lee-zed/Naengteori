name: "Agent Task Request"
description: "Claude 에이전트에게 작업을 요청합니다"
labels: ["agent"]
body:
  - type: textarea
    id: task
    attributes:
      label: "작업 설명"
      description: "에이전트가 수행할 작업을 구체적으로 설명하세요"
      placeholder: |
        ## 목표
        (무엇을 달성해야 하는지)

        ## 상세 요구사항
        - [ ] 요구사항 1
        - [ ] 요구사항 2

        ## 제약 조건
        (지켜야 할 규칙이나 제한사항)

        ## 참고 파일
        (관련 파일 경로)
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: "작업 범위"
      options:
        - "버그 수정"
        - "기능 추가"
        - "리팩토링"
        - "문서 작성"
        - "테스트 추가"
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: "우선순위"
      options:
        - "긴급"
        - "보통"
        - "낮음"
    validations:
      required: true
